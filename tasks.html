<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Заказы</title>
<style>
html,body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}
.panel{
    display:inline-block;
    padding:8px 10px;
}
.title{
    text-align:center;
    color:#ff9800;
    font-size:28px;
    font-weight:bold;
    margin-bottom:8px;
}
.row{
    display:flex;
    align-items:center;
    color:#fff;
    font-size:22px;
    margin:4px 0;
}
.name{
    white-space:nowrap;
}
.dots{
    flex:1;
    border-bottom:2px dotted rgba(255,255,255,.75);
    margin:0 8px 5px;
}
.price{
    white-space:nowrap;
    font-weight:bold;
}
.note{
    color:#00ff66;
    font-size:18px;
    margin-top:10px;
    line-height:1.25;
}
</style>
</head>
<body>
<div class="panel">

<div class="title">ЗАКАЗЫ</div>

<div class="row">
<span class="name">🎵 Музыка</span>
<span class="dots"></span>
<span class="price">300 ₽ ($4)</span>
</div>

<div class="row">
<span class="name">💪 Отжимания</span>
<span class="dots"></span>
<span class="price">400 ₽ ($5)</span>
</div>

<div class="row">
<span class="name">🦵 Приседания</span>
<span class="dots"></span>
<span class="price">500 ₽ ($6)</span>
</div>

<div class="row">
<span class="name">❤️ Подойти к девушке</span>
<span class="dots"></span>
<span class="price">777 ₽ ($10)</span>
</div>

<div class="note">📱 По тел.: <b>+7980 088 19 69</b></div>
<div class="note">🔗 Или по ссылкам / QR</div>

</div>
</body>
</html>
