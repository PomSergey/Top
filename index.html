<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
    margin:3px;
    background:transparent;
    color:white;
    font-size:24px;
    font-family:Arial,sans-serif;
}

.title{
    color:#ff9900;
    font-weight:bold;
    margin-bottom:3px;
    font-size:20px;
    padding-left:50px;
}

table{
    border-collapse:collapse;
}

td{
    padding:0px 1px;
    white-space:nowrap;
}

.name{
    min-width:90px;
}

.total{
    color:#ff9900 !important;
    font-weight:bold;
    font-size:26px;
}

.total td{
    color:#ff9900 !important;
    padding-top:12px;
}

tr:nth-child(1){
    color:#ffd700;
    font-weight:bold;
}

tr:nth-child(n+2){
    color:white;
}
</style>

</head>
<body>

<div class="title">🎁 ПОДАРКИ ИЗ ТАИЛАНДА ЗА ПОДДЕРЖКУ 🎁</div>

<div id="table">Загрузка...</div>

<script>

const JSON_URL =
'https://script.google.com/macros/s/AKfycbx7L1rsVyqqRyBd4s3dcZN6am2OP7qG2-LecGClXjhpkPAgcgF4RjjWUVcbL_eOl0vR/exec';

async function loadData(){

const response =
await fetch(JSON_URL + '?t=' + Date.now());

const data =
await response.json();

let total = 0;

let html = '<table>';

for(let i=0;i<data.length;i++){

const row = data[i];

let medal = '';

if(i===0) medal='🥇';
if(i===1) medal='🥈';
if(i===2) medal='🥉';

const amount = parseInt(row[2]) || 0;
total += amount;

html += '<tr>';

html += '<td>' + medal + ' ' + (row[0] || '') + '</td>';
html += '<td class="name">' + (row[1] || '') + '</td>';
html += '<td>' + (row[2] || '') + '</td>';
html += '<td>' + (row[3] || '') + '</td>';

html += '</tr>';
}

/* пустая строка */
html += '<tr><td colspan="4">&nbsp;</td></tr>';

html += '<tr class="total">';
html += '<td></td>';
html += '<td>ВСЕГО ЗА СТРИМ:</td>';
html += '<td>&nbsp;&nbsp;&nbsp;' + total + '</td>';
html += '<td></td>';
html += '</tr>';

html += '</table>';

document.getElementById('table').innerHTML = html;
}

loadData();
setInterval(loadData,5000);

</script>

</body>
</html>
