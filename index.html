<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
    margin:5px;
    background:transparent;
    color:white;
    font-size:10px;
    font-family:Arial,sans-serif;
}

table{
    border-collapse:collapse;
}

td{
    padding:0px 2px;
    white-space:nowrap;
}

tr:nth-child(1){
    color:#ffd700;
    font-weight:bold;
}

tr:nth-child(2){
    color:#e0e0e0;
    font-weight:bold;
}

tr:nth-child(3){
    color:#d8b56a;
    font-weight:bold;
}
</style>

</head>
<body>

<div id="table">Загрузка...</div>

<script>

const JSON_URL =
'https://script.google.com/macros/s/AKfycbx7L1rsVyqqRyBd4s3dcZN6am2OP7qG2-LecGClXjhpkPAgcgF4RjjWUVcbL_eOl0vR/exec';

async function loadData(){

const response =
await fetch(JSON_URL + '?t=' + Date.now());

const data =
await response.json();

let html = '<table>';

for(const row of data){

html += '<tr>';

html += '<td>' + (row[0] || '') + '</td>';
html += '<td>' + (row[1] || '') + '</td>';
html += '<td>' + (row[2] || '') + '</td>';
html += '<td>' + (row[3] || '') + '</td>';

html += '</tr>';
}

html += '</table>';

document.getElementById('table').innerHTML = html;
}

loadData();
setInterval(loadData,5000);

</script>

</body>
</html>
