<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
    margin:20px;
    background:transparent;
    color:white;
    font-size:28px;
    font-family:Arial,sans-serif;
}

table{
    border-collapse:collapse;
}

td{
    padding:6px 12px;
}
</style>
</head>

<body>

<div id="table"></div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZvGXSCuhemoDCSPr8UMTidXctj2fMYvOmb6vnOq8kMoYGBi-TAFzsENnZ3XU2quE37nUZup219Pw-/pub?gid=313473458&single=true&output=csv';

async function loadData(){

const response =
await fetch(CSV_URL + '&t=' + Date.now());

const text =
await response.text();

const rows =
text.trim().split('\n');

let html = '<table>';

for(const row of rows){

const cols = row.split(',');

html += '<tr>';

for(const col of cols){

html += '<td>' + col + '</td>';

}

html += '</tr>';
}

html += '</table>';

document.getElementById('table').innerHTML = html;
}

loadData();

setInterval(loadData,30000);

</script>

</body>
</html>
