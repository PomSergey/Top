<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
    margin:0;
    background:transparent;
    color:white;
    font-size:18px;
    font-family:Arial,sans-serif;
}

table{
    border-collapse:collapse;
}

td{
    padding:2px 8px;
    white-space:nowrap;
}

.rank{
    width:25px;
}

.name{
    width:120px;
}

.amount{
    width:80px;
    text-align:right;
}

.prize{
    width:220px;
}
</style>

</head>
<body>

<div id="table">Загрузка...</div>

<script>

const JSON_URL =
'https://script.google.com/macros/s/AKfycbx7L1rsVyqqRyBd4s3dcZN6am2OP7qG2-LecGClXjhpkPAgcgF4RjjWUVcbL_eOl0vR/exec';

async function loadData(){

const response =
await fetch(JSON_URL + '?t=' + Date.now());

const data =
await response.json();

let html = '<table>';

for(const row of data){

html += '<tr>';

html += '<td class="rank">' + (row[0] || '') + '</td>';
html += '<td class="name">' + (row[1] || '') + '</td>';
html += '<td class="amount">' + (row[2] || '') + '</td>';
html += '<td class="prize">' + (row[3] || '') + '</td>';

html += '</tr>';
}

html += '</table>';

document.getElementById('table').innerHTML = html;
}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
