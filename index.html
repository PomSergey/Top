<!DOCTYPE html>
<html>
<body>

<div id="table">Загрузка...</div>

<script>

fetch('https://script.google.com/macros/s/AKfycbx7L1rsVyqqRyBd4s3dcZN6am2OP7qG2-LecGClXjhpkPAgcgF4RjjWUVcbL_eOl0vR/exec')
.then(r => r.json())
.then(data => {

let html = '';

for(const row of data){
html += row.join(' | ') + '<br>';
}

document.getElementById('table').innerHTML = html;

});

</script>

</body>
</html>
